name: CI - Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  actions: read

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests/unit -p "test_*.py"

  web_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run web tests
        run: |
          python -m unittest discover -s tests/web -p "test_*.py"

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage collection (non-blocking)
        continue-on-error: true
        run: |
          coverage run -m unittest discover -s tests/unit -p "test_*.py"
          coverage run --append -m unittest discover -s tests/web -p "test_*.py"

      - name: Show coverage summary (non-blocking)
        continue-on-error: true
        run: |
          coverage report -m || true

      - name: Generate coverage XML (non-blocking)
        continue-on-error: true
        run: |
          coverage xml || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: SonarQube code quality scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit_tests, web_tests, coverage]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-tp:latest .